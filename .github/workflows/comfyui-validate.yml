name: ComfyUI Integration -- Validate backwards compatibility

on:
  pull_request:
    branches:
      - master
      - main
    paths:
      - "apps/ComfyUI-vLLM-Omni/**"

defaults:
  run:
    working-directory: apps/ComfyUI-vLLM-Omni

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: comfy-org/node-diff@main
